<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Formulario Estomatología</title>
  <link rel="shortcut icon" href="icono.ico" />
  <link rel="stylesheet" href="Formato.css" />
</head>
<body>
  <header class="site-header" role="banner">
    <img id="logo-sesver" src="Logos/sesver.png" alt="Logo SESVER" onerror="this.style.display='none';" />
  </header>

  <div id="page1" class="page activo">
    <div class="card">
      <h1 class="page-title">Formulario Estomatología</h1>
      <h2>Selecciona la categoría</h2>

      <div class="hospital-row readonly-row">
        <label for="hospitalNombre">Hospital asignado:</label>
        <input id="hospitalNombre" type="text" readonly placeholder="Cargando sesión..." />
      </div>

      <div class="hospital-row readonly-row">
        <label for="usuarioCorreo">Usuario:</label>
        <input id="usuarioCorreo" type="text" readonly placeholder="Cargando usuario..." />
      </div>

      <select id="categoria" aria-label="Selecciona categoría">
        <option value="">--Seleccione--</option>
        <option value="insumos">Insumos</option>
        <option value="material">Material</option>
        <option value="equipo">Equipo médico</option>
        <option value="mobiliario">Mobiliario</option>
        <option value="bienesInformaticos">Bienes informáticos</option>
        <option value="instrumental">Instrumental</option>
      </select>

      <div class="actions page1-actions">
        <button id="btnLogout" type="button">Salir</button>
        <button id="btnSiguiente" type="button">Siguiente</button>
      </div>

      <div id="hospitalStatus" class="status-line"></div>
    </div>
  </div>

  <div id="page2" class="page oculto">
    <div class="card">
      <h2 id="tituloCategoria">Formulario</h2>

      <div class="controls">
        <button id="btnRegresar1" type="button">Regresar</button>
        <button id="btnAgregarFila" type="button">Agregar fila</button>
        <button id="btnAgregarManual" type="button">Agregar no listado</button>
        <button id="btnEliminarSeleccionados" type="button">Eliminar seleccionados</button>
        <button id="btnEnviarInsumos" type="button">Enviar</button>
      </div>

      <table id="tablaInsumos" aria-label="Tabla de insumos">
        <thead>
          <tr>
            <th>No.</th>
            <th>Clave</th>
            <th>Descripción</th>
            <th>Stock</th>
            <th>Mínimo</th>
            <th>Estado</th>
            <th>Caducidad</th>
            <th>Días restantes</th>
            <th>Observaciones</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script type="module" src="Logica.js"></script>
</body>
</html>
